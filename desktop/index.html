<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lafz</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div id="app" class="app-root">
      <main class="loading-shell">
        <div class="empty-card">
        <div class="empty-icon">🎧</div>
        <div class="eyebrow empty-eyebrow"><span class="dot"></span> Lafz desktop</div>
          <h1>Loading Lafz desktop.</h1>
          <p>This standalone desktop shell reads the active system player and pulls translations from your Lafz database.</p>
          <p class="muted">If your session is already allowed, the app will open the desktop shell automatically after startup.</p>
        </div>
      </main>
    </div>
  </body>
</html>
