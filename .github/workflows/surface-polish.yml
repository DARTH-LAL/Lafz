name: Surface Polish

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  surface-polish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run surface polish checks
        run: npm run ci:ai
