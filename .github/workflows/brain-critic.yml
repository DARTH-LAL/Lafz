name: Brain Critic CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brain-critic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Typecheck + Critic Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run brain CI guard
        run: npm run ci:brain
