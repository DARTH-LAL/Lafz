<!doctype html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="supported-color-schemes" content="dark" />
    <title>Your Lafz access code</title>
    <style>
      :root { color-scheme: dark; }
      body, table, td { background-color: #2a0d14 !important; color: #fff0f6 !important; }
      .card { background-color: #060205 !important; }
      .token-box { background-color: #1a0008 !important; }
      h1 { color: #fff0f6 !important; }
      p { color: #fff0f6 !important; }
      .muted { color: #fff0f6 !important; }
    </style>
  </head>
  <body style="margin:0;padding:0;background-color:#2a0d14;" bgcolor="#2a0d14">

    <!-- Outer wrapper -->
    <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#2a0d14" style="background-color:#2a0d14;">
      <tr>
        <td align="center" style="padding:48px 20px 64px;background-color:#2a0d14;">

          <!-- Neon border wrapper (1px gradient trick via table) -->
          <table width="520" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;width:100%;border-radius:22px;background:linear-gradient(135deg,rgba(255,20,100,0.65) 0%,rgba(255,107,168,0.35) 45%,rgba(255,20,100,0.12) 100%);box-shadow:0 0 8px rgba(255,20,100,0.6),0 0 24px rgba(255,20,100,0.4),0 0 60px rgba(255,20,100,0.2);">
            <tr>
              <td style="padding:1px;border-radius:22px;">

                <!-- Card -->
                <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#060205" class="card" style="background-color:#060205;border-radius:21px;overflow:hidden;">

                  <!-- Top accent bar -->
                  <tr>
                    <td style="height:3px;background:linear-gradient(90deg,#ff1464 0%,#ff6ba8 60%,transparent 100%);font-size:0;line-height:0;">&nbsp;</td>
                  </tr>

                  <!-- Card content -->
                  <tr>
                    <td style="padding:36px 32px 32px;background-color:#060205;" bgcolor="#060205">

                      <!-- Logo -->
                      <p style="margin:0 0 28px;font-size:20px;font-weight:800;letter-spacing:-0.5px;line-height:1;">
                        <span style="color:#fff0f6;">la</span><span style="color:#ff1464;">F</span><span style="color:#fff0f6;">z</span>
                      </p>

                      <!-- Eyebrow -->
                      <p style="margin:0 0 8px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#ff1464;font-weight:600;">Access code</p>

                      <!-- Heading -->
                      <h1 style="margin:0 0 14px;font-size:26px;font-weight:700;line-height:1.2;color:#fff0f6;">Sign in to Lafz</h1>

                      <!-- Body -->
                      <p style="margin:0 0 32px;font-size:15px;line-height:1.65;color:#fff0f6;">
                        Enter this code in the Lafz desktop app to continue. It expires in <strong>10 minutes</strong>.
                      </p>

                      <!-- Token box -->
                      <table cellpadding="0" cellspacing="0" border="0" style="border-radius:16px;border:1px solid rgba(255,20,100,0.55);background:linear-gradient(135deg,rgba(255,20,100,0.18) 0%,rgba(255,107,168,0.08) 100%);">
                        <tr>
                          <td style="padding:20px 28px;border-radius:16px;">
                            <p style="margin:0 0 6px;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#ff1464;font-weight:600;">Your code</p>
                            <p style="margin:0;font-size:32px;font-weight:700;letter-spacing:0.24em;color:#ffffff;font-family:'Courier New',Courier,monospace;">{{ .Token }}</p>
                          </td>
                        </tr>
                      </table>

                      <!-- Divider -->
                      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin:32px 0 24px;">
                        <tr>
                          <td style="height:1px;background:linear-gradient(90deg,rgba(255,20,100,0.35) 0%,rgba(255,20,100,0.08) 60%,transparent 100%);font-size:0;line-height:0;">&nbsp;</td>
                        </tr>
                      </table>

                      <!-- Footer note -->
                      <p class="muted" style="margin:0;font-size:13px;line-height:1.6;color:#fff0f6;">
                        Didn't request this? You can safely ignore this email — your account is not affected.
                      </p>

                    </td>
                  </tr>
                </table>

              </td>
            </tr>
          </table>

          <!-- Bottom wordmark -->
          <p style="margin:32px 0 0;text-align:center;font-size:12px;color:#fff0f6;letter-spacing:0.06em;">
            <span style="color:#fff0f6;">la</span><span style="color:#ff1464;">F</span><span style="color:#fff0f6;">z</span>
            &nbsp;&middot;&nbsp; Translations that move with the music
          </p>

        </td>
      </tr>
    </table>

  </body>
</html>
